name: 测试 install.ps1

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-install:
    name: PS ${{ matrix.pwsh_label }}
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - pwsh_exe: powershell
            pwsh_label: '5.1'
          - pwsh_exe: pwsh
            pwsh_label: '7'

    defaults:
      run:
        shell: ${{ matrix.pwsh_exe }}

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 1. 下载 build.yml 的构建产物
      # ----------------------------------------------------------
      - name: 下载构建产物（来自 Build workflow）
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: ShutdownNotice
          path: ci-install
          check_artifacts: true
          search_artifacts: true

      - name: 确认产物
        run: |
          Write-Host "=== Build Artifacts ==="
          $files = Get-ChildItem ci-install -Filter *.exe
          foreach ($f in $files) {
              Write-Host ("  " + $f.Name + ": " + $f.Length + " bytes")
          }

      # ----------------------------------------------------------
      # 2. 执行安装 (tests/ci-install.ps1, UTF-8 BOM)
      # ----------------------------------------------------------
      - name: 执行安装
        run: |
          $installDir = "$env:RUNNER_TEMP\SN-Test"
          Write-Host "Install target: $installDir"
          & "$env:GITHUB_WORKSPACE\tests\ci-install.ps1" -InstallPath $installDir -ExeSource "$env:GITHUB_WORKSPACE\ci-install"
          if ($LASTEXITCODE -ne 0) { throw "Install failed" }

      # ----------------------------------------------------------
      # 3. 验证计划任务 (tests/verify-install.ps1, UTF-8 BOM)
      # ----------------------------------------------------------
      - name: 验证计划任务
        run: |
          & "$env:GITHUB_WORKSPACE\tests\verify-install.ps1"

      # verify gpo-scripts.ps1 syntax (part of install flow)
      - name: verify gpo-scripts.ps1 syntax
        run: |
          $path = "$env:GITHUB_WORKSPACE\gpo-scripts.ps1"
          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors)
          if ($errors.Count -eq 0) {
              Write-Host "[OK] gpo-scripts.ps1 syntax valid" -ForegroundColor Green
          } else {
              foreach ($e in $errors) { Write-Host "[FAIL] $($e.Message)" -ForegroundColor Red }
              throw "gpo-scripts.ps1 syntax check failed"
          }

      # ----------------------------------------------------------
      # 4. 卸载清理
      # ----------------------------------------------------------
      - name: 卸载清理
        if: always()
        run: |
          Write-Host "=== Cleanup ==="
          $installDir = "$env:RUNNER_TEMP\SN-Test"
          & "$env:GITHUB_WORKSPACE\tests\ci-install.ps1" -Uninstall -RemoveFiles -InstallPath $installDir 2>&1
          Write-Host "[OK] Cleanup done"

      # ----------------------------------------------------------
      # 5. 确认无残留
      # ----------------------------------------------------------
      - name: 确认无残留
        if: always()
        run: |
          $folder = "Shutdown Notice"

          cmd.exe /c "schtasks /query /tn `"$folder`" >nul 2>nul"
          $queryExit = $LASTEXITCODE

          if ($queryExit -eq 0) {
              Write-Host "[WARN] Task folder still present" -ForegroundColor Yellow
              cmd.exe /c "schtasks /query /tn `"$folder`" /fo list"
          } else {
              Write-Host "[OK] Task folder fully cleaned" -ForegroundColor Green
          }

          exit 0
