name: UTF8-BOM 检查

on:
  push:
    branches: [master]
    paths:
      - 'install-core.ps1'
  pull_request:
    branches: [master]
    paths:
      - 'install-core.ps1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  normalize-ps1:
    name: Check UTF-8 with BOM and CRLF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 检查是否符合 UTF-8 BOM + CRLF
      - name: 检查 BOM 与换行符
        id: check
        run: |
          set -euo pipefail

          python3 -c "
          import sys

          BOM = b'\xEF\xBB\xBF'
          path = 'install-core.ps1'
          with open(path, 'rb') as f:
              data = f.read()

          errors = []

          # 检查 BOM
          bom_count = 0
          while data.startswith(BOM):
              bom_count += 1
              data = data[len(BOM):]
          if bom_count == 0:
              errors.append('缺少 UTF-8 BOM')
          elif bom_count > 1:
              errors.append(f'BOM 重复 ({bom_count} 个)')

          # 检查换行符
          has_crlf = b'\r\n' in data
          has_lf_only = b'\r\n' not in data and b'\n' in data
          has_cr_only = b'\r\n' not in data and b'\r' in data

          if has_cr_only and not has_crlf:
              errors.append('换行符为 CR')
          elif has_lf_only:
              errors.append('换行符为 LF')
          elif not has_crlf and not has_lf_only and not has_cr_only:
              errors.append('未检测到标准换行符')

          if errors:
              print('=== BOM/CRLF 检查失败 ===')
              for e in errors:
                  print(f'  [FAIL] {e}')
              sys.exit(1)
          else:
              print(f'[OK] BOM: {bom_count} 个, 换行符: CRLF')
          "

      - name: Normalize install-core.ps1
        if: failure() && steps.check.outcome == 'failure'
        run: |
          set -euo pipefail

          python3 -c "
          import sys
          path = 'install-core.ps1'
          with open(path, 'rb') as f:
              data = f.read()

          BOM = b'\xEF\xBB\xBF'

          # 1. 剥离所有重复 BOM
          bom_count = 0
          while data.startswith(BOM):
              bom_count += 1
              data = data[len(BOM):]

          # 2. 统一换行为 CRLF
          data = data.replace(b'\r\n', b'\n').replace(b'\r', b'\n').replace(b'\n', b'\r\n')

          # 3. 写回单 BOM + 内容
          with open(path, 'wb') as f:
              f.write(BOM + data)

          print(f'{path}: stripped {bom_count} BOM(s), normalized line endings')
          "

          # 检查是否有文件被修改
          if git diff --quiet; then
            echo "install-core.ps1 already normalized."
            exit 0
          fi

          echo ""
          echo "=== 变更的文件 ==="
          git diff --stat

      - name: Auto commit fix
        if: |
          failure() &&
          steps.check.outcome == 'failure' &&
          github.event_name != 'pull_request'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add install-core.ps1
          git commit -m "auto fix: normalize install-core.ps1 to UTF-8 with BOM and CRLF line endings"

          # 拉取最新避免冲突
          git pull --rebase origin master
          git push origin master
          echo "[OK] 已自动推送到 master"


      - name: PR Diagnostic Report
        if: |
          failure() &&
          steps.check.outcome == 'failure' &&
          github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "::warning file=install-core.ps1,title=Invalid file encoding::install-core.ps1 must be saved as UTF-8 with BOM and CRLF line endings"
          echo ""
          echo "Fix command:"
          echo "  python fix_normalize_line_endings.py"

          marker="<!-- install-core-format-diagnostic -->"
          comment_file="$(mktemp)"

          cat > "$comment_file" <<'EOF'
          <!-- install-core-format-diagnostic -->
          ## PR Diagnostic Report / PR 诊断报告

          ⚠️ The file `install-core.ps1` does not meet the required format.  
          ⚠️ `install-core.ps1` 文件格式不符合要求。

          **Requirements / 格式要求:**

          - UTF-8 with BOM
          - CRLF line endings

          **Fix command / 修复命令:**

          ```bash
          python fix_normalize_line_endings.py
          ```

          Please run the command above and push the changes again.  
          请运行上述命令后重新提交。
          EOF

          comment_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.user.type == \"Bot\" and (.body | contains(\"${marker}\"))) | .id" \
              | head -n 1
          )"

          if [ -n "$comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              --field body="$(cat "$comment_file")"
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --field body="$(cat "$comment_file")"
          fi

          exit 1
