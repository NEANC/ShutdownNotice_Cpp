name: 沙盒测试 install.ps1

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]
    paths:
      - 'install.ps1'
      - 'tests/test-install.ps1'
      - '.github/workflows/Sandbox-test.yml'
  workflow_dispatch:

jobs:
  test:
    name: PS1 Script Sandbox (PowerShell ${{ matrix.pwsh_label }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pwsh_exe: powershell
            pwsh_label: '5.1'
          - pwsh_exe: pwsh
            pwsh_label: '7'
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 显示 PowerShell 版本 (${{ matrix.pwsh_label }})
        if: matrix.pwsh_exe == 'powershell'
        shell: powershell
        run: $PSVersionTable | Format-Table -AutoSize

      - name: 显示 PowerShell 版本 (${{ matrix.pwsh_label }})
        if: matrix.pwsh_exe == 'pwsh'
        shell: pwsh
        run: $PSVersionTable | Format-Table -AutoSize

      - name: 运行测试 (PowerShell ${{ matrix.pwsh_label }})
        if: matrix.pwsh_exe == 'powershell'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & "$env:GITHUB_WORKSPACE\tests\test-install.ps1"

      - name: 运行测试 (PowerShell ${{ matrix.pwsh_label }})
        if: matrix.pwsh_exe == 'pwsh'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "$env:GITHUB_WORKSPACE\tests\test-install.ps1"
