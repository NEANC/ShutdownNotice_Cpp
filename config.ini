# 关机通知系统 - 配置文件
# 支持同时配置多个通知渠道，任一渠道成功即视为推送成功

[serverchan]
# 留空则不启用 ServerChan 推送
sendkey = 

[dingtalk]
# 留空则不启用钉钉推送
webhook = 

# 钉钉机器人加签密钥 (可选)
secret = 

[notify]
# 通知策略: primary_only (仅主通道) / failover (主通道失败后备用) / both_sequential (串行双通道)
mode = failover
# 主通道: dingtalk / serverchan
primary = dingtalk

[http]
# 代理模式: none (直连) / default (系统代理)
proxy = default
# 各阶段超时(毫秒)
resolve_timeout = 300
connect_timeout = 500
send_timeout = 500
receive_timeout = 800
